name: Feature
description: A request, idea, or new functionality
type: Feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: Describe the problem or need...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should we build?
      placeholder: Describe the solution...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2

  - type: textarea
    id: wireframes
    attributes:
      label: Wireframes / Mockups
      placeholder: Drag and drop images here

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      placeholder: Any other relevant info...
