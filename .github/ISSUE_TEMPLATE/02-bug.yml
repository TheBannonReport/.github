name: Bug
description: An unexpected problem or behavior
type: Bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is broken?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happens?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How urgent is this?
      options:
        - P0 - Critical (production down, data loss)
        - P1 - High (major feature broken, no workaround)
        - P2 - Medium (feature broken, workaround exists)
        - P3 - Low (cosmetic or minor)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS/Windows/Linux
        - Browser: Chrome/Safari/Firefox (if relevant)
        - Version/commit:

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      placeholder: Paste error messages or logs here
      render: shell
